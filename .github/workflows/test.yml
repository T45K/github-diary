name: Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Desktop tests run on Ubuntu with JDK 25.
  # Java 25 is required to match the project's toolchain configuration
  # defined in gradle/libs.versions.toml (java = "25").
  desktop-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run desktop tests
        run: ./gradlew :app:desktopTest

  # Android build check to verify the Android target compiles successfully.
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

  # iOS compilation check runs on macOS to verify the iOS target compiles.
  ios-build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Compile iOS target
        run: ./gradlew :app:compileKotlinIosSimulatorArm64
