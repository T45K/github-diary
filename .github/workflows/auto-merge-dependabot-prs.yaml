name: Auto-merge Dependabot PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge for Dependabot pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if ! gh pr merge --auto --squash "$PR_URL"; then
            echo "Failed to enable auto-merge for $PR_URL." >&2
            echo "Confirm that repository auto-merge is enabled" >&2
            echo "and that branch protection required reviews/checks allow automatic merging." >&2
            exit 1
          fi
